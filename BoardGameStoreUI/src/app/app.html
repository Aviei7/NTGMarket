@if (IsBackendAvailable()) {
  <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
    <div class="container-fluid">
      <a class="navbar-brand" routerLink="/">
        <img src="/assets/icons/header/rolling-dices.svg" alt="Logo" style="height:40px;" />
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" routerLink="/catalog">Catalog</a></li>
          <li class="nav-item"><a class="nav-link" routerLink="/cabinet">Cabinet</a></li>
        </ul>

        <form class="d-flex" (ngSubmit)="onSearch()">
          <input class="form-control me-2" type="search" placeholder="Search..." aria-label="Search" [(ngModel)]="inputSearchText" name="search" />
          <button class="btn btn-outline-light" type="submit">Go</button>
        </form>

        <ul class="navbar-nav ms-3">
          <li class="nav-item">
            <a class="nav-link cart-link" routerLink="/cart">
              <i class="pi pi-shopping-cart"></i>
              @if (cartQuantity > 0) {
                <span class="cart-badge">{{ cartQuantity }}</span>
              }
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/cabinet"><i class="pi pi-user"></i></a>
          </li>
        </ul>

      </div>
    </div>
  </nav>

  <router-outlet />
} @else {
  <app-unavailable />
}
