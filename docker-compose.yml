services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "BoardGameStore!1"
    ports:
      - "14333:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    restart: unless-stopped

  api:
    build:
      context: ./BoardGameStore
      dockerfile: Dockerfile_Backend
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8080"
      Database__Provider: "SqlServer"
      Cache__Provider: "Redis"
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=BoardGameStore;User Id=sa;Password=BoardGameStore!1;TrustServerCertificate=True;Encrypt=False;"
      ConnectionStrings__Redis: "redis:6379"
      Cors__AllowedOrigins__0: "http://localhost:4200"
      JwtOptions__Secure: "false"
      JwtOptions__SameSite: "Lax"
      CartCookieOptions__Secure: "false"
      CartCookieOptions__SameSite: "Lax"
    ports:
      - "5090:8080"
    depends_on:
      - db
      - redis
    restart: unless-stopped

  ui:
    build:
      context: ./BoardGameStoreUI
      dockerfile: Dockerfile_UI
    ports:
      - "4200:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  sqlserver-data:
  redis-data:

